<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Invitación - {{ project.name }}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        const PROJECT_ID = {{ project.id }};
        // Inyectamos la configuración guardada inicial
        const INITIAL_CONFIG = {{ project.config_json | default('{}', true) | safe }};
    </script>
</head>
<body class="editor-body">

    <nav class="editor-nav">
        <div class="nav-left">
            <a href="/admin/projects" class="back-btn">← Volver</a>
            <h2>Editando: {{ project.name }}</h2>
        </div>
        <div class="nav-right">
            <button id="btn-save" class="btn-primary">Guardar Cambios</button>
            <a href="/admin/export/{{ project.id }}" class="btn-secondary" target="_blank">Exportar HTML</a>
        </div>
    </nav>

    <div class="editor-container">
        
        <!-- Panel Izquierdo: Formulario -->
        <div class="editor-sidebar">
            
            <div class="section-card">
                <h3>1. Información Principal</h3>
                <div class="form-group">
                    <label>Título de la Invitación</label>
                    <input type="text" data-key="title" placeholder="Ej: Nuestra Boda">
                </div>
                <div class="form-group">
                    <label>Nombres</label>
                    <input type="text" data-key="names" placeholder="Ej: Ana & Carlos">
                </div>
                <div class="form-group">
                    <label>Mensaje / Frase</label>
                    <textarea data-key="phrase" rows="3" placeholder="Ej: Nos casamos..."></textarea>
                </div>
                <div class="form-group">
                    <label>Fecha y Hora</label>
                    <input type="datetime-local" data-key="date">
                </div>
            </div>

            <div class="section-card">
                <h3>2. Ceremonia</h3>
                <label class="toggle-label">
                    <input type="checkbox" data-key="showCeremony" checked> Mostrar Ceremonia
                </label>
                <div class="toggled-content" data-show-if="showCeremony">
                    <div class="form-group">
                        <label>Nombre del Lugar</label>
                        <input type="text" data-key="ceremonyName" placeholder="Ej: Parroquia San José">
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" data-key="ceremonyAddress" placeholder="Ej: Calle Principal 123">
                    </div>
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="text" data-key="ceremonyTime" placeholder="Ej: 16:00 hrs">
                    </div>
                    <div class="form-group">
                        <label>URL de Google Maps</label>
                        <input type="url" data-key="ceremonyMap" placeholder="https://maps.app.goo.gl/...">
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h3>3. Recepción</h3>
                <label class="toggle-label">
                    <input type="checkbox" data-key="showReception" checked> Mostrar Recepción
                </label>
                <div class="toggled-content" data-show-if="showReception">
                    <div class="form-group">
                        <label>Nombre del Lugar</label>
                        <input type="text" data-key="receptionName" placeholder="Ej: Salón Las Rosas">
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" data-key="receptionAddress" placeholder="Ej: Av. Central 456">
                    </div>
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="text" data-key="receptionTime" placeholder="Ej: 18:00 hrs">
                    </div>
                    <div class="form-group">
                        <label>URL de Google Maps</label>
                        <input type="url" data-key="receptionMap" placeholder="https://maps.app.goo.gl/...">
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h3>4. Regalos</h3>
                <label class="toggle-label">
                    <input type="checkbox" data-key="showGifts" checked> Mostrar Sección de Regalos
                </label>
                <div class="toggled-content" data-show-if="showGifts">
                    <p class="help-text">Puedes habilitar hasta 3 opciones.</p>
                    
                    <!-- Opción 1 -->
                    <div class="sub-card">
                        <label class="toggle-label">
                            <input type="checkbox" data-key="showGift1" checked> Opción 1 (Mesa de Regalos)
                        </label>
                        <div class="toggled-content" data-show-if="showGift1">
                            <div class="form-group">
                                <label>Nombre de Tienda</label>
                                <input type="text" data-key="gift1Name" placeholder="Ej: Liverpool">
                            </div>
                            <div class="form-group">
                                <label>URL de la Mesa</label>
                                <input type="url" data-key="gift1Url" placeholder="https://...">
                            </div>
                        </div>
                    </div>

                    <!-- Opción 2 -->
                    <div class="sub-card">
                        <label class="toggle-label">
                            <input type="checkbox" data-key="showGift2"> Opción 2 (Mesa de Regalos)
                        </label>
                        <div class="toggled-content" data-show-if="showGift2">
                            <div class="form-group">
                                <label>Nombre de Tienda</label>
                                <input type="text" data-key="gift2Name" placeholder="Ej: Amazon">
                            </div>
                            <div class="form-group">
                                <label>URL de la Mesa</label>
                                <input type="url" data-key="gift2Url" placeholder="https://...">
                            </div>
                        </div>
                    </div>

                    <!-- Opción 3 -->
                    <div class="sub-card">
                        <label class="toggle-label">
                            <input type="checkbox" data-key="showGift3"> Opción 3 (Transferencia)
                        </label>
                        <div class="toggled-content" data-show-if="showGift3">
                            <div class="form-group">
                                <label>Banco y Titular</label>
                                <input type="text" data-key="gift3Bank" placeholder="Ej: BBVA - Juan Pérez">
                            </div>
                            <div class="form-group">
                                <label>CLABE o Número de Cuenta</label>
                                <input type="text" data-key="gift3Clabe" placeholder="Ej: 012345678901234567">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h3>5. Confirmación (RSVP)</h3>
                <label class="toggle-label">
                    <input type="checkbox" data-key="showRsvp" checked> Mostrar RSVP
                </label>
                <div class="toggled-content" data-show-if="showRsvp">
                    <div class="form-group">
                        <label>Número de WhatsApp</label>
                        <input type="tel" data-key="whatsappRSVP" placeholder="Ej: 5512345678">
                    </div>
                </div>
            </div>

        </div>

        <!-- Panel Derecho: Previsualización -->
        <div class="editor-preview-panel">
            <div class="preview-toolbar">
                <span>Vista Previa en Vivo</span>
            </div>
            <div class="preview-wrapper">
                <!-- Se inyectará dinámicamente mediante JS -->
                <iframe id="preview-frame" srcdoc=""></iframe>
            </div>
        </div>

    </div>

    <!-- Script de la Vista Previa (Inyectado en el iframe) -->
    <template id="invitation-template">
        <!DOCTYPE html>
        <html lang="es">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vista Previa</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
            <style>
                :root {
                    --primary: #8C7355;
                    --text: #333;
                    --bg: #FAFAFA;
                }
                * { box-sizing: border-box; }
                body {
                    margin: 0; padding: 0;
                    font-family: 'Montserrat', sans-serif;
                    background-color: var(--bg);
                    color: var(--text);
                }
                .invitation-card {
                    max-width: 480px;
                    margin: 0 auto;
                    background: white;
                    min-height: 100vh;
                    box-shadow: 0 0 20px rgba(0,0,0,0.1);
                    text-align: center;
                    padding-bottom: 50px;
                }
                .hero-section {
                    padding: 80px 20px;
                    background-color: #f0ebe1;
                }
                .title {
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 1.5rem;
                    text-transform: uppercase;
                    letter-spacing: 3px;
                    color: var(--primary);
                    margin-bottom: 20px;
                }
                .names {
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 4rem;
                    line-height: 1.1;
                    margin: 20px 0;
                    color: var(--text);
                }
                .phrase {
                    font-size: 1rem;
                    line-height: 1.6;
                    font-style: italic;
                    margin: 20px auto;
                    max-width: 80%;
                }
                .date {
                    font-size: 1.2rem;
                    font-weight: 600;
                    margin: 30px 0;
                    color: var(--primary);
                }
                
                .section {
                    padding: 40px 20px;
                    border-bottom: 1px solid #eee;
                }
                .section h3 {
                    font-family: 'Cormorant Garamond', serif;
                    font-size: 2rem;
                    color: var(--primary);
                    margin-bottom: 20px;
                }
                .details {
                    font-size: 1.1rem;
                    margin-bottom: 10px;
                }
                .btn {
                    display: inline-block;
                    padding: 12px 25px;
                    background-color: var(--primary);
                    color: white;
                    text-decoration: none;
                    border-radius: 30px;
                    font-weight: 600;
                    margin-top: 15px;
                    font-size: 0.9rem;
                    border: none;
                    cursor: pointer;
                }
                .gift-box {
                    background: #f9f9f9;
                    padding: 20px;
                    border-radius: 10px;
                    margin-bottom: 15px;
                }
                .gift-box h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.2rem; }
            </style>
        </head>
        <body>
            <div class="invitation-card">
                
                <div class="hero-section">
                    <div class="title" id="p-title">Nuestra Boda</div>
                    <div class="names" id="p-names">Ana & Carlos</div>
                    <div class="phrase" id="p-phrase">Nos casamos y queremos compartirlo contigo.</div>
                    <div class="date" id="p-date">Sábado 15 de Octubre, 2026</div>
                </div>

                <div class="section" id="s-ceremony">
                    <h3>Ceremonia</h3>
                    <div class="details" id="p-ceremonyName">Parroquia San José</div>
                    <div class="details" style="font-size:0.9rem" id="p-ceremonyAddress">Calle Principal 123</div>
                    <div class="details" id="p-ceremonyTime">16:00 hrs</div>
                    <a href="#" class="btn" id="p-ceremonyMap">Ver Ubicación</a>
                </div>

                <div class="section" id="s-reception">
                    <h3>Recepción</h3>
                    <div class="details" id="p-receptionName">Salón Las Rosas</div>
                    <div class="details" style="font-size:0.9rem" id="p-receptionAddress">Av. Central 456</div>
                    <div class="details" id="p-receptionTime">18:00 hrs</div>
                    <a href="#" class="btn" id="p-receptionMap">Ver Ubicación</a>
                </div>

                <div class="section" id="s-gifts">
                    <h3>Mesa de Regalos</h3>
                    <p>Si deseas tener un detalle con nosotros:</p>
                    
                    <div class="gift-box" id="sg-1">
                        <h4 id="p-gift1Name">Liverpool</h4>
                        <a href="#" class="btn" id="p-gift1Url">Ver Mesa de Regalos</a>
                    </div>
                    
                    <div class="gift-box" id="sg-2">
                        <h4 id="p-gift2Name">Amazon</h4>
                        <a href="#" class="btn" id="p-gift2Url">Ver Mesa de Regalos</a>
                    </div>

                    <div class="gift-box" id="sg-3">
                        <h4 id="p-gift3Bank">BBVA - Juan Pérez</h4>
                        <div style="font-size:1.2rem; font-weight:bold; margin: 10px 0;" id="p-gift3Clabe">0123456789</div>
                        <button class="btn" onclick="alert('CLABE Copiada')">Copiar CLABE</button>
                    </div>
                </div>

                <div class="section" id="s-rsvp">
                    <h3>Confirmar Asistencia</h3>
                    <p>Por favor, confirma tu asistencia enviándonos un mensaje.</p>
                    <a href="#" class="btn" id="p-whatsappRSVP">Confirmar por WhatsApp</a>
                </div>

            </div>
        </body>
        </html>
    </template>

    <!-- Nuestro Script V2 -->
    <script src="/static/app.js"></script>
</body>
</html>
